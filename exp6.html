<!DOCTYPE html>
<html>
<head>
    <title>Iframe Layout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; }
        #header { width: 100%; height: 150px; display: block; margin-bottom: 10px; }
        #main { display: flex; gap: 10px; height: 400px; }
        #menu { width: 30%; height: 100%; }
        #content { width: 70%; height: 100%; }
        iframe { width: 100%; height: 100%; border: 1px solid #ccc; }
        .back-btn {
    position: fixed;
    bottom: 15px;
    left: 15px;
    background: #333;
    color: white;
    padding: 10px 15px;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
}

/* Hover effect */
.back-btn:hover {
    background: red;
}
    </style>
</head>

<body>

<!-- Header -->
<div id="header">
    <iframe srcdoc="
        <html>
        <head>
            <style>
                body { margin: 0; padding: 20px; background: navy; color: white; text-align: center; }
                h2 { color: yellow; }
            </style>
        </head>
        <body>
            <h2>Header Section</h2>
            <p>This is simple header text.</p>
        </body>
        </html>
    "></iframe>
</div>

<!-- Main Container -->
<div id="main">
    <!-- Menu -->
    <div id="menu">
        <iframe srcdoc="
            <html>
            <head>
                <style>
                    body { margin: 0; padding: 15px; background: #f0fff0; }
                    h3 { color: green; }
                    li { color: darkgreen; }
                </style>
            </head>
            <body>
                <h3>Menu</h3>
                <ul>
                    <li>Home</li>
                    <li>About</li>
                </ul>
            </body>
            </html>
        "></iframe>
    </div>

    <!-- Content -->
    <div id="content">
        <iframe srcdoc="
            <html>
            <head>
                <style>
                    body { margin: 0; padding: 15px; background: #fff0f0; }
                    h3 { color: red; }
                    li { color: maroon; }
                </style>
            </head>
            <body>
                <h3>Content Area</h3>
                <ol>
                    <li>HTML</li>
                    <li>CSS</li>
                    <li>JavaScript</li>
                </ol>
            </body>
            </html>
        "></iframe>
    </div>
</div>
<a href="index.html" class="back-btn">← Back</a>
</body>
</html>
