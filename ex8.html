<!DOCTYPE html>
<html>
<head>
    <title>HTML Lists </title>
</head>
<body>

<h2>Unordered List </h2>
<ul>
    <li>Apple</li>
    <li>Banana</li>
    <li>Mango</li>
</ul>

<h2>Ordered List </h2>
<ol>
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
</ol>

<h2>Definition List</h2>
<dl>
    <dt>HTML</dt>
    <dd>HyperText Markup Language</dd>

    <dt>CSS</dt>
    <dd>Cascading Style Sheets</dd>
</dl>

<div style="position:fixed; bottom:10px; left:10px;">
    <a href="index.html">
        <button>← Back</button>
    </a>
</div>   
</body>
</html>
