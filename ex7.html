<!DOCTYPE html>
<html>
<head>
<title>Hyperlink Example</title>
</head>

<body>

<h1>Study of Hyperlinks in HTML</h1>

<!-- Text Link -->
<h2>1. Text Link</h2>
<p>Click the link below to visit Google:</p>

<a href="https://www.google.com" target="_blank">
Visit Google
</a>

<hr>

<!-- Image Link -->
<h2>2. Image Link</h2>
<p>Click the image to visit Wikipedia:</p>

<a href="https://www.wikipedia.org" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/63/Wikipedia-logo.png"
width="150" height="150" alt="Wikipedia">
</a>

<hr>

<!-- Image Map -->
<h2>3. Image Map</h2>
<p>Click different areas of the image:</p>

<img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/HTML5_Logo_512.png"
usemap="#htmlmap"
width="300"
border="2"
alt="HTML Image Map">

<map name="htmlmap">

<area shape="circle"
coords="150,150,80"
href="https://developer.mozilla.org/en-US/docs/Web/HTML"
target="_blank"
alt="HTML Tutorial">

<area shape="rect"
coords="10,10,100,100"
href="https://www.w3schools.com"
target="_blank"
alt="W3Schools">

</map>

<hr>

<p>End of Hyperlink Demonstration</p>

<div style="position:fixed; bottom:10px; left:10px;">
    <a href="index.html">
        <button>← Back</button>
    </a>
</div>   
</body>
</html>
